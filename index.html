<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>भजन / आरती संग्रह</title>

	<link rel="icon" href="./favicon.ico" type="image/x-icon">
	<link rel="icon" type="image/png" href="./om-icon.png">
	<link rel="apple-touch-icon" href="./om-icon.png">


  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #fff8ec;
      --card: #ffffff;
      --text: #3b2300;
      --muted: #7a4b15;
      --primary: #7f1d1d;
      --primary2: #c2410c;
      --accent: #f59e0b;
      --border: #f0c987;
      --soft: #fff1c7;
      --shadow: rgba(127, 29, 29, 0.14);
      --lyricSize: 25px;
    }
    body.dark {
      --bg: #130f0a;
      --card: #21170f;
      --text: #fff5df;
      --muted: #e6c58d;
      --primary: #f59e0b;
      --primary2: #fbbf24;
      --accent: #fde68a;
      --border: #684b24;
      --soft: #332312;
      --shadow: rgba(0, 0, 0, 0.35);
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Noto Sans Devanagari", "Mangal", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .app-header {
      background: linear-gradient(135deg, #7f1d1d, #c2410c, #f59e0b);
      color: #fff;
      padding: 16px 14px 14px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .header-row {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .app-header h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1.2;
    }
    .count-text { font-size: 13px; opacity: 0.92; margin-top: 4px; }
    .icon-btn, .small-btn {
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .library, .reader {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 12px 90px;
    }
    .search-box {
      position: sticky;
      top: 74px;
      z-index: 45;
      background: var(--bg);
      padding: 10px 0 11px;
    }
    .search-box input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 15px 16px;
      border-radius: 16px;
      font-size: 18px;
      outline: none;
      box-shadow: 0 3px 14px var(--shadow);
    }
    .categories {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 8px 0 14px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--primary);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .cat-btn.active {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }
    .song-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .song-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 15px;
      box-shadow: 0 5px 18px var(--shadow);
      cursor: pointer;
    }
    .song-card h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
      color: var(--primary);
    }
    .song-card p {
      margin: 8px 0 0;
      font-size: 10px;
      line-height: 1.5;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      margin-top: 10px;
      background: var(--soft);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }
    .empty {
      text-align: center;
      padding: 36px 12px;
      color: var(--muted);
      font-size: 18px;
    }
    .reader { display: none; }
    .reader-top {
      position: sticky;
      top: 0;
      z-index: 70;
      background: linear-gradient(135deg, #7f1d1d, #c2410c, #f59e0b);
      margin: -14px -12px 14px;
      padding: 12px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .reader-row {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .reader-actions { display: flex; gap: 7px; align-items: center; }
    .reader-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 28px var(--shadow);
    }
    .reader-head {
      background: linear-gradient(180deg, var(--soft), var(--card));
      border-bottom: 1px solid var(--border);
      padding: 18px 16px 12px;
    }
    .reader-head h2 {
      margin: 0;
      color: var(--primary);
      font-size: clamp(27px, 6vw, 42px);
      line-height: 1.35;
    }
    .lyrics {
      white-space: pre-line;
      padding: 20px 16px 30px;
      font-size: var(--lyricSize);
      line-height: 2.1;
      letter-spacing: 0.1px;
    }
    .chorus {
      background: var(--soft);
      border-left: 6px solid var(--primary2);
      border-radius: 14px;
      padding: 10px 12px;
      margin: 8px 0 16px;
      font-weight: 900;
    }
    .note {
      margin: 16px;
      background: var(--soft);
      padding: 13px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .bottom-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .nav-btn {
      border: none;
      background: var(--primary);
      color: var(--bg);
      padding: 14px 12px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
    }
    .floating-top {
      position: fixed;
      right: 16px;
      bottom: 18px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: var(--bg);
      font-size: 25px;
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      cursor: pointer;
      z-index: 80;
    }
    @media (min-width: 760px) {
      .song-list { grid-template-columns: repeat(2, 1fr); }
      .lyrics { padding: 28px 34px 40px; }
      .reader-head { padding: 26px 34px 16px; }
    }
    @media (max-width: 480px) {
      .app-header { padding-top: 13px; }
      .search-box { top: 67px; }
      .icon-btn, .small-btn { padding: 8px 10px; font-size: 15px; }
      .song-card h2 { font-size: 21px; }
      .lyrics { line-height: 2.15; }
    }
  </style>
</head>
<body>
  <header class="app-header" id="topHeader">
    <div class="header-row">
      <div>
        <h1>भजन / आरती संग्रह</h1>
        <div class="count-text" id="songCount">गीत सूची</div>
      </div>
      <button class="icon-btn" onclick="toggleDarkMode()" aria-label="Dark Mode">🌙</button>
    </div>
  </header>

  <section class="library" id="libraryView">
    <div class="search-box">
      <input id="searchInput" type="search" placeholder="भजन खोजें... जैसे कृष्ण, गोविन्द" oninput="renderSongs()" />
    </div>

    <div class="categories" id="categoryButtons"></div>
    <div class="song-list" id="songList"></div>
  </section>

  <section class="reader" id="readerView">
    <div class="reader-top">
      <div class="reader-row">
        <button class="small-btn" onclick="backToLibrary()">← सूची</button>
        <div class="reader-actions">
          <button class="small-btn" onclick="changeFont(-2)">A−</button>
          <button class="small-btn" onclick="changeFont(2)">A+</button>
          <button class="small-btn" onclick="toggleDarkMode()">🌙</button>
        </div>
      </div>
    </div>

    <div class="reader-card">
      <div class="reader-head">
        <h2 id="readerTitle"></h2>
        <span class="badge" id="readerCategory"></span>
      </div>
      <div class="lyrics" id="readerLyrics"></div>
      <div class="note" id="readerNote" style="display:none;"></div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" onclick="openRelativeSong(-1)">← पिछला</button>
      <button class="nav-btn" onclick="openRelativeSong(1)">अगला →</button>
    </div>
  </section>

  <button class="floating-top" onclick="scrollTopPage()" aria-label="ऊपर जाएँ">↑</button>

दलितं मधुरं फलितं मधुरं
मधुराधिपतेरखिलं मधुरम् ॥८॥

॥ इति श्रीवल्लभाचार्यविरचितं मधुराष्टकं सम्पूर्णम् ॥`}
    ];

    let selectedCategory = "सभी";
    let currentSongIndex = 0;
    let currentList = songs;
    let lyricSize = 25;

    function init() {
      renderCategories();
      renderSongs();
    }

    function renderCategories() {
      const categories = ["सभी", ...new Set(songs.map(song => song.category))];
      document.getElementById("categoryButtons").innerHTML = categories.map(cat => `
        <button class="cat-btn ${cat === selectedCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function selectCategory(category) {
      selectedCategory = category;
      renderCategories();
      renderSongs();
    }

    function renderSongs() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      currentList = songs.filter(song => {
        const matchCategory = selectedCategory === "सभी" || song.category === selectedCategory;
        const text = `${song.title} ${song.category} ${song.search}`.toLowerCase();
        return matchCategory && text.includes(query);
      });

      document.getElementById("songCount").textContent = `${currentList.length} गीत उपलब्ध`;

      const songList = document.getElementById("songList");
      if (!currentList.length) {
        songList.innerHTML = `<div class="empty">कोई भजन नहीं मिला</div>`;
        return;
      }

      songList.innerHTML = currentList.map((song, index) => `
        <article class="song-card" onclick="openSong(${index})">
          <h2>${song.title}</h2>
          <span class="badge">${song.category}</span>
        </article>
      `).join("");
    }

    function openSong(index) {
      currentSongIndex = index;
      const song = currentList[currentSongIndex];
      document.getElementById("libraryView").style.display = "none";
      document.querySelector(".app-header").style.display = "none";
      document.getElementById("readerView").style.display = "block";
      document.getElementById("readerTitle").textContent = song.title;
      document.getElementById("readerCategory").textContent = song.category;
      document.getElementById("readerLyrics").innerHTML = song.lyrics;
      const note = document.getElementById("readerNote");
      if (song.note) {
        note.style.display = "block";
        note.textContent = song.note;
      } else {
        note.style.display = "none";
        note.textContent = "";
      }
      scrollTopPage();
    }

    function backToLibrary() {
      document.getElementById("readerView").style.display = "none";
      document.querySelector(".app-header").style.display = "block";
      document.getElementById("libraryView").style.display = "block";
      scrollTopPage();
    }

    function openRelativeSong(direction) {
      if (!currentList.length) return;
      currentSongIndex = (currentSongIndex + direction + currentList.length) % currentList.length;
      openSong(currentSongIndex);
    }

    function changeFont(change) {
      lyricSize = Math.max(19, Math.min(38, lyricSize + change));
      document.documentElement.style.setProperty('--lyricSize', lyricSize + 'px');
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function scrollTopPage() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    init();
  </script>
</body>
</html>
